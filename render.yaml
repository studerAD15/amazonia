services:
  - type: web
    name: amazonia-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm run server
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_URI_DIRECT
        sync: false
      - key: MONGO_DNS_SERVERS
        value: 8.8.8.8,1.1.1.1
      - key: CLIENT_URLS
        sync: false
